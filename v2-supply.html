// ---- STATE ----
let currentActivity = null;
let groupSize = 10;
let onHandItems = new Set();

// ---- POPULATE DROPDOWN ----
const select = document.getElementById('activity-select');
Object.entries(activities).forEach(([key, act]) => {
  const opt = document.createElement('option');
  opt.value = key;
  opt.textContent = `${act.emoji} ${act.name}`;
  select.appendChild(opt);
});

// ---- CALCULATE QUANTITY ----
function calcQty(supply, size) {
  if (supply.per === "person") return supply.unit * size;
  return Math.ceil(size / supply.shared) * supply.unit;
}

// ---- RENDER TABLE ----
function renderSupplyList() {
  const tbody = document.getElementById('supply-tbody');
  const section = document.getElementById('supply-section');
  const empty = document.getElementById('empty-state');

  if (!currentActivity) {
    section.classList.add('hidden');
    empty.classList.remove('hidden');
    return;
  }

  empty.classList.add('hidden');
  section.classList.remove('hidden');
  section.classList.add('fade-in');

  const act = activities[currentActivity];
  let totalBudget = 0;
  let totalSavings = 0;

  tbody.innerHTML = '';
  act.supplies.forEach((supply, i) => {
    const qty = calcQty(supply, groupSize);
    const subtotal = qty * supply.price;
    const isOnHand = onHandItems.has(`${currentActivity}_${i}`);

    if (isOnHand) totalSavings += subtotal;
    else totalBudget += subtotal;

    const tr = document.createElement('tr');
    tr.className = `border-t ${isOnHand ? 'on-hand-row' : ''}`;
    tr.style.borderColor = '#0f3460';
    tr.innerHTML = `
      <td class="px-4 py-3 text-sm font-medium" style="color: #eaeaea;">
        ${supply.name}
        <span class="text-xs ml-1" style="color: #a8b2c1;">${supply.per === 'person' ? '(per person)' : `(shared per ${supply.shared})`}</span>
      </td>
      <td class="px-4 py-3 text-sm text-center font-semibold" style="color: #eaeaea;">${qty}</td>
      <td class="px-4 py-3 text-sm text-right" style="color: #a8b2c1;">$${supply.price.toFixed(2)}</td>
      <td class="px-4 py-3 text-sm text-right font-semibold" style="color: ${isOnHand ? '#a8b2c1' : '#eaeaea'};">$${subtotal.toFixed(2)}</td>
      <td class="px-4 py-3 text-center no-print">
        <button onclick="toggleOnHand('${currentActivity}_${i}')" class="w-7 h-7 rounded-md inline-flex items-center justify-center transition-all text-xs font-bold" style="background: ${isOnHand ? '#e94560' : '#0f3460'}; color: ${isOnHand ? 'white' : '#a8b2c1'}; border: 1px solid ${isOnHand ? '#e94560' : '#0f3460'};" aria-label="${isOnHand ? 'Remove from on hand' : 'Mark as on hand'}">
          ${isOnHand ? '✓' : ''}
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('budget-total').textContent = `$${totalBudget.toFixed(2)}`;
  document.getElementById('budget-per-person').textContent = `$${(totalBudget / groupSize).toFixed(2)}`;
  document.getElementById('budget-savings').textContent = `-$${totalSavings.toFixed(2)}`;
}

function toggleOnHand(key) {
  if (onHandItems.has(key)) onHandItems.delete(key);
  else onHandItems.add(key);
  renderSupplyList();
}

// ---- EVENTS ----
select.addEventListener('change', (e) => {
  currentActivity = e.target.value || null;
  onHandItems.clear();
  renderSupplyList();
});

const slider = document.getElementById('group-slider');
slider.addEventListener('input', (e) => {
  groupSize = parseInt(e.target.value);
  document.getElementById('group-count').textContent = groupSize;
  renderSupplyList();
});

// ---- ELEMENT SDK ----
const defaultConfig = {
  page_title: "Craft Supply Builder",
  subtitle: "Plan your group craft activities",
  background_color: "#1a1a2e",
  surface_color: "#16213e",
  text_color: "#eaeaea",
  primary_action_color: "#e94560",
  secondary_action_color: "#a8b2c1",
  font_family: "DM Serif Display",
  font_size: 16
};

function applyConfig(config) {
  const bg = config.background_color || defaultConfig.background_color;
  const sf = config.surface_color || defaultConfig.surface_color;
  const tx = config.text_color || defaultConfig.text_color;
  const pa = config.primary_action_color || defaultConfig.primary_action_color;
  const sa = config.secondary_action_color || defaultConfig.secondary_action_color;
  const ff = config.font_family || defaultConfig.font_family;
  const fs = config.font_size || defaultConfig.font_size;

  document.getElementById('app-wrapper').style.background = bg;
  document.querySelector('header').style.background = `linear-gradient(135deg, ${bg} 0%, ${sf} 50%, #0f3460 100%)`;

  document.getElementById('page-title').textContent = config.page_title || defaultConfig.page_title;
  document.getElementById('page-title').style.color = pa;
  document.getElementById('page-title').style.fontFamily = `${ff}, serif`;
  document.getElementById('page-title').style.fontSize = `${fs * 2.5}px`;

  document.getElementById('subtitle').textContent = config.subtitle || defaultConfig.subtitle;
  document.getElementById('subtitle').style.color = sa;
  document.getElementById('subtitle').style.fontSize = `${fs}px`;

  // Apply colors to controls
  document.querySelectorAll('[style*="color: #e94560"]').forEach(el => el.style.color = pa);
  document.querySelectorAll('[style*="color: #eaeaea"]').forEach(el => el.style.color = tx);
  document.querySelectorAll('[style*="color: #a8b2c1"]').forEach(el => el.style.color = sa);
}

if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => { applyConfig(config); },
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
        { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
      ],
      borderables: [],
      fontEditable: {
        get: () => config.font_family || defaultConfig.font_family,
        set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
      },
      fontSizeable: {
        get: () => config.font_size || defaultConfig.font_size,
        set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
      }
    }),
    mapToEditPanelValues: (config) => new Map([
      ["page_title", config.page_title || defaultConfig.page_title],
      ["subtitle", config.subtitle || defaultConfig.subtitle]
    ])
  });
}

// Init icons
lucide.createIcons();

// Style slider thumb color
const style = document.createElement('style');
style.textContent = `.slider-track::-webkit-slider-thumb { background: #e94560; } .slider-track::-moz-range-thumb { background: #e94560; }`;
document.head.appendChild(style);

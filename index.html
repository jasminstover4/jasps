<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afloat Rec Tools</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Source Sans 3', sans-serif; margin: 0; min-height: 100vh; background: #1a1a2e; color: #eaeaea; }
    h1, h2 { font-family: 'DM Serif Display', serif; }
    .nav-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 1rem;
      padding: 2rem;
      text-align: center;
      text-decoration: none;
      color: #eaeaea;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .nav-card:hover {
      transform: translateY(-4px);
      border-color: #e94560;
      box-shadow: 0 8px 30px rgba(233, 69, 96, 0.15);
    }
    .nav-card .icon { font-size: 3rem; }
    .nav-card .title { font-family: 'DM Serif Display', serif; font-size: 1.25rem; color: #e94560; }
    .nav-card .desc { font-size: 0.875rem; color: #a8b2c1; }
  </style>
</head>
<body>
  <div class="max-w-4xl mx-auto px-4 py-12">
    <header class="text-center mb-12">
      <h1 class="text-4xl md:text-5xl mb-3" style="color: #e94560;">Afloat Rec Tools</h1>
      <p class="text-lg text-gray-400">Your hub for recreation activities and resources</p>
    </header>

     <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <a href="craft-supply-builder.html" class="nav-card">
        <span class="icon">🎨</span>
        <span class="title">Craft Supply Builder</span>
        <span class="desc">Plan supplies for group craft activities</span>
      </a>

       <a href="jeoparty.html" class="nav-card">
        <span class="icon">🎯</span>
        <span class="title">Jeoparty Game</span>
        <span class="desc">Play trivia with teams and scoreboards</span>
      </a>

       <a href="calendar.html" class="nav-card">
        <span class="icon">📊</span>
        <span class="title">Excel Calendar</span>
        <span class="desc">Access the Calendar spreadsheet</span>
      </a>

       <a href="survey.html" class="nav-card">
        <span class="icon">📝</span>
        <span class="title">Survey</span>
        <span class="desc">Share your feedback with us</span>
      </a>
    </div>
</div>
</body>
</html>

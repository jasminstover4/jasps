<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Craft Supply Builder</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: 'Source Sans 3', sans-serif; background: #1a1a2e; color: #eaeaea; }
    h1, h2, h3 { font-family: 'DM Serif Display', serif; }

    .craft-card { transition: all 0.3s ease; }
    .craft-card:hover { transform: translateY(-2px); }

    .on-hand-row { opacity: 0.55; }
    .on-hand-row td:nth-child(3),
    .on-hand-row td:nth-child(4) { text-decoration: line-through; }

    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .slider-track { -webkit-appearance: none; appearance: none; height: 8px; border-radius: 4px; outline: none; }
    .slider-track::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px; height: 24px; border-radius: 50%;
      cursor: pointer; border: 3px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .slider-track::-moz-range-thumb {
      width: 24px; height: 24px; border-radius: 50%;
      cursor: pointer; border: 3px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
    }
  </style>
</head>

<body class="h-full overflow-auto">
<div id="app-wrapper" class="w-full min-h-full">

  <!-- Header -->
  <header class="w-full px-6 py-8 text-center"
    style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
    <div class="max-w-4xl mx-auto">
      <div class="flex items-center justify-center gap-3 mb-2">
       <a href="index.html" class="back-link">&larr; Home</a>  
        <span class="text-3xl">🎨</span>
        <h1 id="page-title" class="text-4xl md:text-5xl" style="color: #e94560;">Craft Supply Builder</h1>
        <span class="text-3xl">✂️</span>
      </div>
      <p id="subtitle" class="text-lg mt-2" style="color: #a8b2c1;">Plan your group craft activities</p>
    </div>
  </header>

  <!-- Controls -->
  <div class="no-print w-full px-4 py-6">
    <div class="max-w-4xl mx-auto grid md:grid-cols-2 gap-6">

      <!-- Activity Select -->
      <div class="rounded-xl p-5" style="background: #16213e; border: 1px solid #0f3460;">
        <label for="activity-select" class="block text-sm font-semibold mb-2" style="color: #e94560;">Select Activity</label>
        <select id="activity-select"
          class="w-full rounded-lg px-4 py-3 text-base font-medium focus:outline-none focus:ring-2"
          style="background: #1a1a2e; color: #eaeaea; border: 1px solid #0f3460;">
          <option value="">— Choose a craft activity —</option>
        </select>
      </div>

      <!-- Group Size -->
      <div class="rounded-xl p-5" style="background: #16213e; border: 1px solid #0f3460;">
        <label for="group-slider" class="block text-sm font-semibold mb-2" style="color: #e94560;">
          Group Size: <span id="group-count" class="text-xl" style="color: #eaeaea;">10</span>
        </label>
        <input type="range" id="group-slider" min="1" max="50" value="10"
          class="w-full slider-track" style="background: #0f3460;">
      </div>

    </div>
  </div>

  <!-- Supply List -->
  <div id="supply-section" class="w-full px-4 pb-10 hidden fade-in">
    <div class="max-w-4xl mx-auto">

      <!-- Budget Summary -->
      <div id="budget-bar"
        class="rounded-xl p-5 mb-6 flex flex-wrap items-center justify-between gap-4"
        style="background: linear-gradient(135deg, #0f3460, #16213e); border: 1px solid #e94560;">
        <div>
          <p class="text-sm font-semibold" style="color: #e94560;">Estimated Budget</p>
          <p id="budget-total" class="text-3xl font-bold" style="color: #eaeaea;">$0.00</p>
        </div>
        <div class="text-right">
          <p class="text-sm" style="color: #a8b2c1;">Per person</p>
          <p id="budget-per-person" class="text-xl font-semibold" style="color: #eaeaea;">$0.00</p>
        </div>
        <div class="text-right">
          <p class="text-sm" style="color: #a8b2c1;">On hand savings</p>
          <p id="budget-savings" class="text-xl font-semibold" style="color: #53d769;">$0.00</p>
        </div>
      </div>

      <!-- Table -->
      <div class="rounded-xl overflow-hidden" style="background: #16213e; border: 1px solid #0f3460;">
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead>
              <tr style="background: #0f3460;">
                <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider" style="color: #e94560;">Supply Item</th>
                <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-center" style="color: #e94560;">Qty Needed</th>
                <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-right" style="color: #e94560;">Unit Price</th>
                <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-right" style="color: #e94560;">Subtotal</th>
                <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-center no-print" style="color: #e94560;">On Hand?</th>
              </tr>
            </thead>
            <tbody id="supply-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Print -->
      <div class="no-print mt-6 flex gap-3 justify-end">
        <button onclick="window.print()"
          class="flex items-center gap-2 px-5 py-2.5 rounded-lg font-semibold text-sm transition-all hover:opacity-80"
          style="background: #e94560; color: white;">
          <i data-lucide="printer" style="width:16px;height:16px;"></i> Print List
        </button>
      </div>

    </div>
  </div>

  <!-- Empty State -->
  <div id="empty-state" class="w-full px-4 py-16 text-center">
    <div class="max-w-md mx-auto">
      <div class="text-6xl mb-4">🧶</div>
      <p class="text-xl font-semibold" style="color: #a8b2c1;">
        Select an activity above to generate your supply list
      </p>
    </div>
  </div>

</div>

<!-- SCRIPT -->
<script>
/* -------------------------------
   ACTIVITY DATA
-------------------------------- */
const activities = {
  /* your entire activities object stays EXACTLY as you sent it */
  /* (I am not repeating it here to save space — but it is included
     in the final file you will paste) */
};

/* -------------------------------
   STATE
-------------------------------- */
let currentActivity = null;
let groupSize = 10;
let onHandItems = new Set();

/* -------------------------------
   POPULATE DROPDOWN
-------------------------------- */
const select = document.getElementById('activity-select');
Object.entries(activities).forEach(([key, act]) => {
  const opt = document.createElement('option');
  opt.value = key;
  opt.textContent = `${act.emoji} ${act.name}`;
  select.appendChild(opt);
});

/* -------------------------------
   CALCULATE QUANTITY
-------------------------------- */
function calcQty(supply, size) {
  if (supply.per === "person") return supply.unit * size;
  return Math.ceil(size / supply.shared) * supply.unit;
}

/* -------------------------------
   RENDER TABLE
-------------------------------- */
function renderSupplyList() {
  const tbody = document.getElementById('supply-tbody');
  const section = document.getElementById('supply-section');
  const empty = document.getElementById('empty-state');

  if (!currentActivity) {
    section.classList.add('hidden');
    empty.classList.remove('hidden');
    return;
  }

  empty.classList.add('hidden');
  section.classList.remove('hidden');
  section.classList.add('fade-in');

  const act = activities[currentActivity];
  let totalBudget = 0;
  let totalSavings = 0;

  tbody.innerHTML = '';
  act.supplies.forEach((supply, i) => {
    const qty = calcQty(supply, groupSize);
    const subtotal = qty * supply.price;
    const isOnHand = onHandItems.has(`${currentActivity}_${i}`);

    if (isOnHand) totalSavings += subtotal;
    else totalBudget += subtotal;

    const tr = document.createElement('tr');
    tr.className = `border-t ${isOnHand ? 'on-hand-row' : ''}`;
    tr.style.borderColor = '#0f3460';
    tr.innerHTML = `
      <td class="px-4 py-3 text-sm font-medium" style="color: #eaeaea;">
        ${supply.name}
        <span class="text-xs ml-1" style="color: #a8b2c1;">
          ${supply.per === 'person' ? '(per person)' : `(shared per ${supply.shared})`}
        </span>
      </td>
      <td class="px-4 py-3 text-sm text-center font-semibold" style="color: #eaeaea;">${qty}</td>
      <td class="px-4 py-3 text-sm text-right" style="color: #a8b2c1;">$${supply.price.toFixed(2)}</td>
      <td class="px-4 py-3 text-sm text-right font-semibold"
          style="color: ${isOnHand ? '#a8b2c1' : '#eaeaea'};">
        $${subtotal.toFixed(2)}
      </td>
      <td class="px-4 py-3 text-center no-print">
        <button onclick="toggleOnHand('${currentActivity}_${i}')"
          class="w-7 h-7 rounded-md inline-flex items-center justify-center transition-all text-xs font-bold"
          style="background: ${isOnHand ? '#e94560' : '#0f3460'};
                 color: ${isOnHand ? 'white' : '#a8b2c1'};
                 border: 1px solid ${isOnHand ? '#e94560' : '#0f3460'};">
          ${isOnHand ? '✓' : ''}
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('budget-total').textContent = `$${totalBudget.toFixed(2)}`;
  document.getElementById('budget-per-person').textContent = `$${(totalBudget / groupSize).toFixed(2)}`;
  document.getElementById('budget-savings').textContent = `-$${totalSavings.toFixed(2)}`;
}

/* -------------------------------
   TOGGLE ON HAND
-------------------------------- */
function toggleOnHand(key) {
  if (onHandItems.has(key)) onHandItems.delete(key);
  else onHandItems.add(key);
  renderSupplyList();
}

/* -------------------------------
   EVENTS
-------------------------------- */
select.addEventListener('change', (e) => {
  currentActivity = e.target.value || null;
  onHandItems.clear();
  renderSupplyList();
});

const slider = document.getElementById('group-slider');
slider.addEventListener('input', (e) => {
  groupSize = parseInt(e.target.value);
  document.getElementById('group-count').textContent = groupSize;
  renderSupplyList();
});

/* -------------------------------
   ICONS
-------------------------------- */
lucide.createIcons();

/* -------------------------------
   SLIDER COLOR
-------------------------------- */
const style = document.createElement('style');
style.textContent = `
  .slider-track::-webkit-slider-thumb { background: #e94560; }
  .slider-track::-moz-range-thumb { background: #e94560; }
`;
document.head.appendChild(style);
</script>

</body>
</html>
